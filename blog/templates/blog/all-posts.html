{% extends "base.html" %}
{% load static %}

{% block title %}
All Posts
{% endblock %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'blog/post.css' %}">
    <link rel="stylesheet" href="{% static 'blog/all-posts.css' %}">
{% endblock %}

{% block content %}
<section id='all-posts'>
    <h2>Archive of All my Posts</h2>
    <ul>
        {% for post in collection %}
            {% include "blog/includes/_post.html" %}
        {% endfor %}
    </ul>
</section>

{% endblock %}
