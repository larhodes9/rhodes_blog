{% load static %}

<li>
    <article class="post">

        {% if post.slug %}
            <a href="{% url "post-detail-page" post.slug %}">
                <img src="{{ post.image_name.url}}" alt="{{ post.title }}">
                <div class="post_content">
                    <h3>{{ post.title }}</h3>
                    <p>{{ post.excerpt }}</p>
                </div>
            </a>
        {% else %}
            <span> (Not available) </span>
        {% endif %}

    </article>
</li>
