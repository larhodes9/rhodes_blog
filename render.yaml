databases:
  - name: rhodes_sitedb
    plan: free
    databaseName: rhodes_site
    user: rhodes_site

services:
  - type: web
    plan: free
    name: rhodes_site
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn rhodes_site.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rhodes_sitedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4